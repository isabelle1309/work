<link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Shift Dashboard</h1>

        <button id="logoutBtn" class="btn btn-outline-secondary">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </div>

    <div class="d-flex gap-2 mb-3">
        <button id="startBtn" class="btn btn-success">
            <i class="bi bi-play-fill"></i> Start Shift
        </button>

        <button id="endBtn" class="btn btn-danger">
            <i class="bi bi-stop-fill"></i> End Shift
        </button>
    </div>

    <div class="row mb-3">
        <div class="col">
            <div class="card p-3 shadow-sm">
                <h5>Total Hours</h5>
                <h3 id="totalHours">0</h3>
            </div>
        </div>

        <div class="col">
            <div class="card p-3 shadow-sm">
                <h5>Total Earnings</h5>
                <h3>€<span id="totalEarnings">0</span></h3>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle table-sm">
            <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Hours</th>
                    <th>Pay %</th>
                    <th>Weighted</th>
                    <th>Month</th>
                    <th>Earnings</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script type="module">
import { auth } from "./script/firebase.js";
import { signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "/index.html";
    }
});

document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "/index.html";
};
</script>

<script type="module" src="./script/app.js"></script>
