<style>
    html {
        font-size: clamp(14px, 1.2vw, 18px);
    }
</style>

<link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container">

    <div class="row justify-content-center align-items-center vh-100 px-3">

        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card shadow-sm p-4 border-0">

                <h3 class="mb-4 text-center">evil ass login page</h3>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input id="email" type="email" class="form-control form-control-lg" placeholder=" ">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input id="password" type="password" class="form-control form-control-lg" placeholder=" ">
                </div>

                <button id="loginBtn" class="btn btn-primary btn-lg w-100">
                    :3
                </button>

                <div id="errorMsg" class="text-danger mt-3 text-center small"></div>

            </div>

        </div>

    </div>

</div>

<script type="module">
    import { auth } from "./script/firebase.js";
    import { signInWithEmailAndPassword }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const errorMsg = document.getElementById("errorMsg");

    document.getElementById("email").focus();

    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            errorMsg.textContent = "";

            await signInWithEmailAndPassword(auth, email, password);

            window.location.href = "/app.html";

        } catch (e) {
            errorMsg.textContent = "Login failed. Check your credentials.";
        }
    };
</script>
