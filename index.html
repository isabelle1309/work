<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    html {
        font-size: clamp(14px, 1.2vw, 18px);
    }
</style>

<body>
    <div class="container">

        <div class="row justify-content-center align-items-center vh-100 px-3">

            <div class="col-12 col-sm-10 col-md-6 col-lg-4">

                <div class="card shadow-sm p-4 border-0">

                    <h3 class="mb-4 text-center">evil ass login page</h3>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input id="email" type="email" class="form-control form-control-lg" placeholder=" ">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input id="password" type="password" class="form-control form-control-lg" placeholder=" ">
                    </div>

                    <button id="loginBtn" class="btn btn-primary btn-lg w-100">
                        :3
                    </button>

                    <div id="errorMsg" class="text-danger mt-3 text-center small"></div>

                </div>

            </div>

        </div>

    </div>
</body>
<script type="module">
    import { auth } from "./script/firebase.js";
    import { signInWithEmailAndPassword }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    emailInput.focus();

    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !loginBtn.disabled) {
            loginBtn.click();
        }
    });

    loginBtn.onclick = async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            errorMsg.textContent = "Please enter both email and password.";
            return;
        }
        
        try {
            errorMsg.textContent = "";

            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";

            await signInWithEmailAndPassword(auth, email, password);

            window.location.href = "/app.html";
        }
        catch (e) {
            console.error("Login error:", e);

            switch (e.code) {
                case "auth/too-many-requests":
                    errorMsg.textContent =
                        "Too many login attempts. Please try again later.";
                    break;

                case "auth/invalid-credential":
                    errorMsg.textContent =
                        "Invalid email or password.";
                    break;

                case "auth/network-request-failed":
                    errorMsg.textContent =
                        "Network error. Check your internet connection.";
                    break;

                default:
                    errorMsg.textContent =
                        "Login failed. Please try again.";
            }
        }
        finally {
            loginBtn.disabled = false;
            loginBtn.textContent = ":3";
        }
    };
</script>

</html>
