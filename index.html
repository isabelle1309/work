<link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-sm p-4" style="min-width: 320px; max-width: 400px; width: 100%;">

        <h3 class="mb-3 text-center">evil ass login page</h3>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" class="form-control" placeholder=" ">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" placeholder=" ">
        </div>

        <button id="loginBtn" class="btn btn-primary w-100">
            :3
        </button>

        <div id="errorMsg" class="text-danger mt-3 text-center small"></div>

    </div>

</div>

<script type="module">
import { auth } from "./script/firebase.js";
import { signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const errorMsg = document.getElementById("errorMsg");

document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        errorMsg.textContent = "";

        await signInWithEmailAndPassword(auth, email, password);

        window.location.href = "/app.html";

    } catch (e) {
        errorMsg.textContent = "Login failed. Check your credentials.";
    }
};
</script>
