<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calendar</title>

    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../style/calendar.css">

    <script type="module" src="../script/calendar.js"></script>

    <script type="module">
        import { auth } from "../script/firebase.js";
        import { onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../index.html";
            }
        });
    </script>

</head>

<body>

    <div id="timeTooltip"></div>

    <nav class="navbar navbar-dark custom-navbar">
        <div class="container">

            <a href="landingpage.html" class="navbar-brand">
                <i class="bi bi-calendar-week"></i>
                Planneur :3
            </a>

            <button class="btn btn-outline-light" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i>
                Logout
            </button>

        </div>
    </nav>

    <div class="container-fluid mt-4">

        <div class="row mb-3">

            <div class="col d-flex justify-content-between align-items-center">

                <button class="btn btn-primary" id="prevWeek">
                    <i class="bi bi-arrow-left"></i>
                    Previous Week
                </button>

                <h3 id="weekTitle" class="text-center m-0"></h3>

                <button class="btn btn-primary" id="nextWeek">
                    Next Week
                    <i class="bi bi-arrow-right"></i>
                </button>

            </div>

        </div>

        <div id="calendarHeader"></div>
        <div id="calendarGrid"></div>

    </div>

    <div class="modal fade" id="appointmentModal" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Appointment
                    </h5>

                    <button class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <input id="appointmentTitle" class="form-control mb-3" placeholder="Title">

                    <textarea id="appointmentDescription" class="form-control mb-3" rows="4"
                        placeholder="Description"></textarea>

                    <label class="form-label">
                        Start
                    </label>

                    <input type="datetime-local" id="appointmentStart" class="form-control mb-3">

                    <label class="form-label">
                        End
                    </label>

                    <input type="datetime-local" id="appointmentEnd" class="form-control mb-3">

                    <label class="form-label">
                        Color
                    </label>

                    <input type="color" id="appointmentColor" class="form-control form-control-color" value="#0d6efd">

                </div>

                <div class="modal-footer">

                    <button class="btn btn-danger me-auto" id="deleteAppointment">

                        Delete

                    </button>

                    <button class="btn btn-secondary" data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button class="btn btn-primary" id="saveAppointment">

                        Save

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">

        import { auth } from "../script/firebase.js";

        import { signOut }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        document.getElementById("logoutBtn").onclick = async () => {

            await signOut(auth);

            window.location.href = "../index.html";

        };

    </script>

</body>

</html>
