<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">

    <script type="module" src="../script/landingpage.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/landingpage.css">

    <script src="../script/landingpage.js"></script>

    <script type="module">
        import { auth } from "../script/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../index.html";
            }
        });
    </script>

    <title>Landing Page</title>
</head>

<body>

    <nav class="navbar navbar-dark custom-navbar">
        <div class="container">
            <a href="#" class="navbar-brand">
                <i class="bi bi-house-fill"></i> Landing Page
            </a>

            <button class="btn btn-outline-light" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 id="greet"></h1>
            <p class="text-muted" id="date">
            </p>
            <h3 class="text-muted" id="time">
            </h3>
        </div>

        <div class="row justify-content-center g-4">

            <div class="col-md-5">
                <div class="card landing-card h-100 text-center p-4" onclick="window.location.href='timetracker.html'">

                    <div class="card-body">
                        <i class="bi bi-clock-history landing-icon"></i>

                        <h3 class="mt-3">
                            milloin, tohtori freeman?
                        </h3>

                        <p class="text-muted">
                            pidän rahasta
                        </p>

                        <button class="btn btn-primary mt-3">
                            avoin työajan seuranta
                        </button>
                    </div>

                </div>
            </div>

            <div class="col-md-5">
                <div class="card landing-card h-100 text-center p-4" onclick="window.location.href='calendar.html'">

                    <div class="card-body">
                        <i class="bi bi-calendar3 landing-icon"></i>

                        <h3 class="mt-3">
                            kalenteri
                        </h3>

                        <p class="text-muted">
                            hmm, joo, rinnat
                        </p>

                        <button class="btn btn-primary mt-3">
                            avaa kalenteri
                        </button>
                    </div>

                </div>
            </div>

        </div>

    </div>

</body>
<script type="module">
    import { auth } from "../script/firebase.js";
    import { signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    document.getElementById("logoutBtn").onclick = async () => {
        await signOut(auth);
        window.location.href = "../index.html";
    };
</script>

</html>
