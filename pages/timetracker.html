<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/app.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker</title>
    <script type="module">
        import { auth } from "../script/firebase.js";
        import { onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../index.html";
            }
        });
    </script>
</head>

<body>

    <nav class="navbar navbar-dark custom-navbar">
        <div class="container">
            <a href="landingpage.html" class="navbar-brand">
                <i class="bi bi-clock-history"></i> Time Tracker
            </a>

            <button id="logoutBtn" class="btn btn-outline-light">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container py-3 py-md-4">

        <div class="row align-items-center mb-4 g-2">

            <div class="col-12 col-md-auto d-flex align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <label for="monthSel" class="mb-0 text-nowrap">Filter by month:</label>
                    <select id="monthSel" class="form-select form-select-sm w-auto"></select>
                </div>
            </div>

            <div class="col-12 col-md d-flex">
                <div class="card p-2 p-md-3 shadow-sm text-center w-100 h-100">
                    <small class="text-muted">Days Left</small>
                    <h4 id="daysLeft" class="mb-0">0</h4>
                </div>
            </div>

        </div>

        <div class="d-grid d-md-flex gap-2 mb-3">

            <button id="startBtn" class="btn btn-success flex-fill flex-md-none">
                <i class="bi bi-play-fill"></i> Start Shift
            </button>

            <button id="endBtn" class="btn btn-danger flex-fill flex-md-none">
                <i class="bi bi-stop-fill"></i> End Shift
            </button>

        </div>

        <div class="row g-2 mb-3">

            <div class="col-6 col-md-6">
                <div class="card p-2 p-md-3 shadow-sm text-center">
                    <small class="text-muted">Total Hours</small>
                    <h4 id="totalHours" class="mb-0">0</h4>
                </div>
            </div>

            <div class="col-6 col-md-6">
                <div class="card p-2 p-md-3 shadow-sm text-center">
                    <small class="text-muted">Total Earnings</small>
                    <h4 class="mb-0">€<span id="totalEarnings">0</span></h4>
                </div>
            </div>

        </div>

        <div class="table-responsive shadow-sm rounded">

            <table class="table table-striped table-hover align-middle table-sm mb-0">

                <thead class="table-dark">
                    <tr>
                        <th class="text-nowrap">Date</th>
                        <th class="text-nowrap">In</th>
                        <th class="text-nowrap">Out</th>
                        <th class="hours">Hrs</th>
                        <th>Pay</th>
                        <th class="weighted">W</th>
                        <th class="month">Month</th>
                        <th>Eur</th>
                    </tr>
                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>
</body>
<script type="module">
    import { auth } from "../script/firebase.js";
    import { signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    document.getElementById("logoutBtn").onclick = async () => {
        await signOut(auth);
        window.location.href = "../index.html";
    };
</script>

<script type="module" src="../script/timetracker.js"></script>

</html>
