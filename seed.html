<!DOCTYPE html>
<html>
<head>
    <title>Seed Data</title>
</head>
<body>
    <h2>Seeding Firebase...</h2>

<script type="module">
import { db } from "./script/firebase.js";
import { collection, addDoc, Timestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const shifts = [
  {
    date: "2026-06-15",
    checkIn: "10:55:00",
    checkOut: "20:13:00",
    hours: 9.30
  }
];

function toTimestamp(dateStr, timeStr) {
    const [h, m, s] = timeStr.split(":");
    const d = new Date(dateStr);
    d.setHours(h, m, s);
    return Timestamp.fromDate(d);
}

async function seed() {
    for (const s of shifts) {
        await addDoc(collection(db, "shifts"), {
            date: s.date,
            checkIn: toTimestamp(s.date, s.checkIn),
            checkOut: toTimestamp(s.date, s.checkOut),
            hours: s.hours,
            payPercent: 100,
            monthId: s.date.slice(0, 7)
        });

        console.log("Inserted:", s.date);
    }

    console.log("DONE");
}

seed();
</script>

</body>
</html>
